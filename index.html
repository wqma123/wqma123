<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rubik's Pro - Cubie Color Logic</title>
    <style>
        :root { --accent: #444; --hover: #666; --special: #27ae60; --specialgm: #175530; --middle: #34495e; --slice: #34495e; --highlight: #f1c40f; --oftenUsed: #6e0399;}
        
		body{ 
            background: #111; color: #fff; font-family: 'Segoe UI', sans-serif; 
            margin: 0; overflow: hidden; height: 100vh;
            display: grid;
            grid-template-areas: 
                "settings top     top-r"
                "left     scene   right"
                "bottom   bottom  bottom";
            grid-template-columns: 90px 1fr 97px;
            grid-template-rows: 200px 1fr 170px;
        }

		.layer-group {
			display: flex;
			align-items: center;
			gap: 2px;
			margin: 5px 0;
		}
	
		.layer-grouph {
			display: flex;
			align-items: center;
			gap: 3px;
		}
		
	
        /* Layout Panels */
        .settings-panel   { grid-area: settings; display: flex; flex-direction: column; justify-content: center; align-items: flex-end;  z-index: 900; background: #95bd8f; }
        .top-ctrls    { grid-area: top; display: flex; flex-direction: column; justify-content: center; align-items: center; gap: 8px; z-index: 100; background: #80b079; }
        .bottom-ctrls { grid-area: bottom; display: flex; flex-direction: column; justify-content: center; align-items: center; gap: 8px; z-index: 900; background: #95bd8f; }
        .system-ctrls { grid-area: top-r; display: flex; flex-direction: column; justify-content: center; align-items: center; gap: 4px; z-index: 100; padding-top: 5px; z-index: 900;background: #95bd8f; }
        .left-ctrls   { grid-area: left; display: flex; flex-direction: column; justify-content: center; align-items: left; padding-right: 1px; gap: 8px; z-index: 100; background: #80b079; }
        .right-ctrls  { grid-area: right; display: flex; flex-direction: column; justify-content: center; align-items: flex-start; padding-left: 1px; gap: 8px; z-index: 800; background: #80b079; }
        .bottom-left-ctrls { grid-area: bottom-l; display: flex; flex-direction: column; justify-content: center; align-items: flex-end; padding-right: 20px; gap: 8px;     z-index: 910; background: #95bd8f; }
        .bottom-right-ctrls { grid-area: bottom-r; display: flex; flex-direction: column; justify-content: center; align-items: flex-start; padding-left: 40px; gap: 8px; z-index: 100; background: #95bd8f; }

        .scene { grid-area: scene; perspective: 1200px; display: flex; align-items: center; justify-content: center; position: relative; background: #a22;  }
        .cube-world { width: 0; height: 0; position: absolute; transform-style: preserve-3d; transition: transform 0.1s linear; pointer-events: auto; }
        
        .mirror-container {
            position: absolute; width: 140px; height: 140px; perspective: 800px;
            display: flex; align-items: center; justify-content: center;
            pointer-events: none; 
            background: rgba(255,255,255,0); 
        }
        .mirror-label { position: absolute; top: 5px; left: 5px; font-size: 9px; color: #aaa; text-transform: uppercase; letter-spacing: 1px; }
        .mirror-back { top: 10px; transform: scaleX(-1); } 
        .mirror-left { left: 1px; transform: scaleX(-1); }
        .mirror-bottom { bottom: 10px; transform: scaleY(-1); }

		.htctrl-container {
            position: absolute; width: 120px; height: 140px; perspective: 800px;
            display: flex; align-items: center; justify-content: center;
        }
		.htctrl { top: 10px; } 
		.stctrl { bottom: 10px; }

		.color-sel-container {
			position: relative; 
			width: 25px; /* Increased slightly to fit the grid and label */
			height: 95px; 
			perspective: 800px;
			display: flex; 
			align-items: center; 
			justify-content: center;
			/* CHANGE THIS: */
			pointer-events: none; 
			border: 2px solid rgba(0,255,0,0.5);
			background: rgba(0,255,0,0.03); 
			border-radius: 6px;  
			z-index: 900;
			margin-top: 20px;
			merge-left: 1px;
		}

		.color-picker-group {
			display: grid; 
			grid-template-columns: repeat(2, 1fr); 
			gap: 5px; 
			margin-left: 1px;
			/* Extra safety to ensure buttons are interactive */
			pointer-events: auto; 
		}

        .cubie { position: absolute; width: 50px; height: 50px; transform-style: preserve-3d; margin-top: -25px; margin-left: -25px; }
        .face { position: absolute; width: 48px; height: 48px; border: 2px solid #000; background: #222; border-radius: 6px; backface-visibility: hidden; pointer-events: auto; }

		/* Highlighting style */
		.highlighted-cubie .face {
			box-shadow: inset 0 0 15px 5px var(--highlight);
			border-color: var(--highlight);
			z-index: 10;
		}


        .f { transform: translateZ(25px); } .b { transform: rotateY(180deg) translateZ(25px); }
        .u { transform: rotateX(90deg) translateZ(25px); } .d { transform: rotateX(-90deg) translateZ(25px); }
        .l { transform: rotateY(-90deg) translateZ(25px); } .r { transform: rotateY(90deg) translateZ(25px); }
        .pivot { position: absolute; transform-style: preserve-3d; transition: transform 0.35s cubic-bezier(0.4, 0, 0.2, 1); }

        button { width: 45px; height: 45px; border: none; background: var(--accent); color: white; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 13px; transition: all 0.2s; box-shadow: 0 4px 0 #000; }
        button:hover { background: var(--hover); transform: translateY(-2px); box-shadow: 0 6px 0 #000; }
        button:active { transform: translateY(2px); box-shadow: 0 2px 0 #000; }
        .special-btn { background: var(--special); width: 30px; font-size: 11px; }
        .special-btngm { background: var(--specialgm); width: 30px; font-size: 11px; }
		.oftenUsed-btn { background: var(--oftenUsed); width: 32px; font-size: 11px; }
        .mid-btn { background: var(--middle); }
        .slice-btn { background: var(--slice); }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 3px; }
		.grid-1 { display: grid; grid-template-columns: 1fr; gap: 2px; }
		
		.grid-3 { display: grid; grid-template-columns: 1fr 1fr; 1fr; gap: 3px; }
			
			
        .sys-btn { width: 95px; font-size: 10px; margin-bottom: 2px; height: 32px; }
		.sys-btnh { width: 40px; height: 32px; font-size: 10px; }
        .sys-btnS { width: 85px; font-size: 15px; margin-bottom: 2px; height: 40px; }
		.sys-btnSs { width: 75px; font-size: 13px; margin-bottom: 2px; height: 50px; }
        .sys-btnr { width: 85px; font-size: 13px; margin-bottom: 2px; height: 30px; }
		.scramble { background: #368e22; }
        .restart { background: #2980b9; }
		.solve { background: #f05039; }
        .save-btn { background: #27ae60; }
        .load-btn { background: #8e44ad; }
		.reset { background: #5f444d; }
		 
        .label { font-size: 10px; color: #666; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 2px; width: 100%; text-align: inherit; }
        input[type=range] { width: 100px; cursor: pointer; accent-color: #e67e22; pointer-events: auto; }
        #move-input { background: #000; border: 1px solid #444; color: #aaa; padding: 5px; width: 105px; font-size: 11px; border-radius: 4px; margin-bottom: 5px; height: 60px; overflow-y: auto; text-align: left; line-height: 1.8; }
        .step-node { padding: 1px 3px; margin: 1px; border-radius: 3px; display: inline-block; }
        .step-active { background: var(--highlight); color: #000; font-weight: bold; text-decoration: underline; }
        #color-hud { background: rgba(0,0,0,0.8); border: 1px solid #444; padding: 10px; border-radius: 8px; font-size: 11px; width: 110px; text-align: left; }
        .color-row { display: flex; align-items: center; gap: 8px; margin-top: 5px; }
        .swatch { width: 14px; height: 14px; border: 1px solid #fff; border-radius: 2px; }
		
		/* This mimics the look of a physical click */
		.btn-pressed {
			transform: translateY(2px);
			filter: brightness(0.8);
			box-shadow: none !important;
		}
		
		.round-color-btn {
			width: 22px;
			height: 22px;
			border-radius: 50%;
			border: 1px solid #444;
			cursor: pointer;
			transition: transform 0.1s, border-color 0.2s;
			padding: 0;
		}

		.round-color-btn:hover {
			transform: scale(1.2);
			border-color: #fff;
			box-shadow: 0 0 8px rgba(255,255,255,0.5);
		}

		.round-color-btn:active {
			transform: scale(0.9);
		}


		.hidden {
			display: none !important;
		}

		.inactive {
			opacity: 0.5;
			pointer-events: none;
			user-select: none;
		}

		.disabled {
			display: none;
			/* or */
			/* visibility: hidden; */
			/* or */
			/* opacity: 0.3; */
			/* pointer-events: none; */
		}

		.help-container {
			position: relative; 
			width: 100%; /* Increased slightly to fit the grid and label */
			height:70px; 
			perspective: 800px;
			display: flex; 
			align-items: center; 
			justify-content: center;
			/* CHANGE THIS: */
			pointer-events: none; 
			border: 2px solid rgba(0,255,0,0.5);
			background: rgba(0,255,0,0.03); 
			border-radius: 6px;  
			z-index: 110;

		}

		.helpT-container {
            position: absolute; width: 120px; height: 140px; perspective: 800px;
            display: flex; align-items: center; justify-content: center;
        }
		

		
    </style>
</head>
<body>


				<div class="settings-panel" style="display: flex; flex-direction: column; justify-content: flex-start; align-items: flex-start;  padding-left: 3px; padding-right: 3px; height: 100%; box-sizing: border-box;">

							<button class="sys-btnr scramble" style="margin-top: 10px; margin-left: 5px;" onclick="scramble(false)" data-i18n="scramble" data-i18n-tip="scramble-tip" title="scramble the cube" >SCRAMBLE</button>

						 </div>

							<option value="en">English</option>
							<option value="zh">中文</option>
						</select>
					</div>
					
					<button class="sys-btnS reset" style="margin-top: 8px; margin-left: -0px;" onclick="resetCube()" data-i18n="reset" data-i18n-tip="reset-tip" title="reset the whole cube"  >RESET</button>

    function downloadFile(content, fileName) {
        const a = document.createElement("a");
        const file = new Blob([content], {type: 'application/json'});
        a.href = URL.createObjectURL(file);
        a.download = fileName;
        a.click();
        URL.revokeObjectURL(a.href);

        input.accept = '.json';
        input.onchange = e => {

            const reader = new FileReader();
            reader.onload = readerEvent => {
                const content = JSON.parse(readerEvent.target.result);
                moveLog = content.moveLog || [];
                currentPointer = content.currentPointer || 0;
                updateLogUI();
            };

			console.log("Sequence file=", file.name);

            reader.readAsText(file);
        };
        input.click();
    }

        }));

    }

    function loadStateFromFile() {
        const input = document.createElement('input');
		
        input.type = 'file';
        input.accept = '.json';
        input.onchange = e => {
            const file = e.target.files[0];
            const reader = new FileReader();
            reader.onload = readerEvent => {
                const state = JSON.parse(readerEvent.target.result);
                registry.forEach(cube => {
                    cube.cubies.forEach(c => {
                        const saved = state.find(s => s.id === `${c.dataset.hx},${c.dataset.hy},${c.dataset.hz}`);
                        if (saved) {
                            c.style.transform = saved.transform;
                            cube.el.appendChild(c);
                        }
                    });
                });
            };

			console.log("state file=", file.name);

            reader.readAsText(file);
        };
        input.click();
    }


	function loadCubeState(stateData) {
		// 1. Loop through all cube instances in the registry (Main + Mirrors)
		registry.forEach(cubeInstance => {
			
			// 2. Loop through each state object in your JSON array
			stateData.forEach(item => {
				const coords = item.id.split(',');
				const hx = coords[0];
				const hy = coords[1];
				const hz = coords[2];

				// 3. Find the cubie in this specific cube instance matching the coordinates
				const cubie = cubeInstance.cubies.find(c => 
					c.dataset.hx === hx && 
					c.dataset.hy === hy && 
					c.dataset.hz === hz
				);

				if (cubie) {
					// 4. Apply the matrix3d transform directly
					cubie.style.transform = item.transform;
				}
			});

	function syncFaceColorToMirrors(clickedFace, newColor) {
		const cubie = clickedFace.parentElement;
		const hx = cubie.dataset.hx;
		const hy = cubie.dataset.hy;
		const hz = cubie.dataset.hz;
		const sideClass = Array.from(clickedFace.classList).find(c => c.length === 1);

		// Update all matching cubies in mirror registries
		registry.forEach(cube => {
			const matchingCubie = cube.cubies.find(c => 
				c.dataset.hx === hx && c.dataset.hy === hy && c.dataset.hz === hz
			);
			if (matchingCubie) {
				const matchingFace = matchingCubie.querySelector(`.face.${sideClass}`);
				if (matchingFace) matchingFace.style.background = newColor;
			}
		});
	}

	/**
	 * Changes all visible faces of a specific cubie to a new color.
	 * @param {string} cubieKey - The key from cubiesPos (e.g., 'umr', 'fmc')
	 * @param {string} newColor - The color value (e.g., '#fff', 'red', or colors['u'])
	 * Example usage: 
	 * change_cubie_color('fmc', '#ff00ff');
	 */
	function change_cubie_color(cubieKey, newColor) {
		const pos = cubiesPos[cubieKey];
		if (!pos) {
			console.error("Invalid cubie key:", cubieKey);
			return;
		}

		const [hx, hy, hz] = pos;

		// We must update the cubie in the main cube and all 3 mirror registries
		registry.forEach(cube => {
			const cubie = cube.cubies.find(c => 
				parseInt(c.dataset.hx) === hx && 
				parseInt(c.dataset.hy) === hy && 
				parseInt(c.dataset.hz) === hz
			);

			if (cubie) {
				const faces = cubie.querySelectorAll('.face');
				faces.forEach(face => {
					// Only change faces that aren't the default dark internal color
					const currentBG = face.style.background;
					if (currentBG !== 'rgb(34, 34, 34)' && currentBG !== '#222') {
						face.style.background = newColor;
					}
				});
			}
		});
	}

	
	/**
	 * Changes a single specific face color of a specific cubie.
	 * @param {string} cubieKey - The key from cubiesPos (e.g., 'umr')
	 * @param {string} faceCode - The face to change ('u', 'd', 'f', 'b', 'l', 'r')
	 * @param {string} newColor - The color value (e.g., colors['u'] or '#ffffff')
	 * Example: change_cubie_face_color('fmc', 'f', colors['u']);
	 */
	function change_cubie_face_color(cubieKey, faceCode, newColor) {
		const pos = cubiesPos[cubieKey];
		if (!pos) {
			console.error("Invalid cubie key:", cubieKey);
			return;
		}

		const [hx, hy, hz] = pos;

		// Search through all cubes in the registry (Main, Back, Left, Bottom)
		registry.forEach(cube => {
			const cubie = cube.cubies.find(c => 
				parseInt(c.dataset.hx) === hx && 
				parseInt(c.dataset.hy) === hy && 
				parseInt(c.dataset.hz) === hz
			);

			if (cubie) {
				// Find the specific face element by its class
				const face = cubie.querySelector(`.face.${faceCode}`);
				if (face) {
					face.style.background = newColor;
					
					// Sync with mirror images
					syncFaceColorToMirrors(face, newColor);
				}
			}
		});
	}

	

    function getCubieFaceColors(targetX, targetY, targetZ) {
        const cubie = registry[0].cubies.find(c => {
            const m = new DOMMatrix(getComputedStyle(c).transform);
            return Math.round(m.m41 / 52) === targetX && Math.round(m.m42 / 52) === targetY && Math.round(m.m43 / 52) === targetZ;
        });
        if (!cubie) return {};
        const result = {}, matrix = new DOMMatrix(getComputedStyle(cubie).transform);
        const normals = { u:[0,-1,0], d:[0,1,0], f:[0,0,1], b:[0,0,-1], l:[-1,0,0], r:[1,0,0] };
        cubie.querySelectorAll('.face').forEach(f => {
            const sideClass = Array.from(f.classList).find(c => c.length === 1);
            const n = normals[sideClass];
            const rx = n[0]*matrix.m11 + n[1]*matrix.m21 + n[2]*matrix.m31;
            const ry = n[0]*matrix.m12 + n[1]*matrix.m22 + n[2]*matrix.m32;
            const rz = n[0]*matrix.m13 + n[1]*matrix.m23 + n[2]*matrix.m33;
            const worldDir = getDir(rx, ry, rz);
            if (worldDir) {
                const color = f.style.background;
                if (color && color !== 'rgb(34, 34, 34)' && color !== '#222') result[worldDir] = color;
            }
        });
        return result;
    }

	function isCubeSolvedAnyOrientation() {
		if (!registry || registry.length === 0) return false;
		const cubies = registry[0].cubies;

		// 1. Helper to get real-world position
		const getPos = (el) => {
			const m = new WebKitCSSMatrix(window.getComputedStyle(el).transform);
			return { x: Math.round(m.m41), y: Math.round(m.m42), z: Math.round(m.m43) };
		};

		// 2. Define the 6 physical directions (faces) in the 3D world
		const worldFaces = [
			{ axis: 'y', val: -52, label: 'Top' },
			{ axis: 'y', val: 52,  label: 'Bottom' },
			{ axis: 'x', val: -52, label: 'Left' },
			{ axis: 'x', val: 52,  label: 'Right' },
			{ axis: 'z', val: 52,  label: 'Front' },
			{ axis: 'z', val: -52, label: 'Back' }
		];

		for (const face of worldFaces) {
			// Find the 9 cubies currently occupying this physical plane
			const planeCubies = cubies.filter(c => {
				const p = getPos(c);
				return Math.abs(p[face.axis] - face.val) < 10;
			});

			if (planeCubies.length !== 9) continue; 

			// 3. Find which sticker class is pointing "out" for this plane
			// We do this by checking the center cubie of this face (0 on other axes)
			const centerCubie = planeCubies.find(c => {
				const p = getPos(c);
				const otherAxes = ['x', 'y', 'z'].filter(a => a !== face.axis);
				return Math.abs(p[otherAxes[0]]) < 10 && Math.abs(p[otherAxes[1]]) < 10;
			});

			if (!centerCubie) return false;

			// Identify the one sticker on the center cubie that isn't black
			const stickers = centerCubie.querySelectorAll('.face');
			let targetClass = "";
			let referenceColor = "";

			// We find the sticker that is physically facing the correct world direction
			// In a solved cube, the center cubie only has ONE colored sticker facing out.
			for (const s of stickers) {
				const bg = s.style.background;
				if (bg !== 'rgb(34, 34, 34)' && bg !== '#222' && bg !== '') {
					referenceColor = bg;
					// We assume the class (.u, .f, etc) tells us which side of the CUBIE it is
					targetClass = s.className.split(' ').find(c => c.length === 1); 
					break;
				}
			}

			// 4. Verification: Every cubie on this physical face must have 
			// the SAME color pointing in this SAME direction.
			for (const cubie of planeCubies) {
				const sticker = cubie.querySelector('.' + targetClass);
				if (!sticker || sticker.style.background !== referenceColor) {
					return false; 
				}
			}
		}

		return true;
	}

	function moveVirtualCursorToElement(myButton) {
	
		const element = document.getElementById(myButton);
		 
	
		// Create a virtual mouse cursor
		const virtualCursor = document.createElement('div');
		virtualCursor.style.position = 'fixed';
		virtualCursor.style.width = '20px';
		virtualCursor.style.height = '20px';
		virtualCursor.style.background = 'red';
		virtualCursor.style.borderRadius = '50%';
		virtualCursor.style.pointerEvents = 'none';
		virtualCursor.style.zIndex = '9999';
		document.body.appendChild(virtualCursor);

	
		// Move virtual cursor to button
		const rect = element.getBoundingClientRect();
		virtualCursor.style.left = (rect.left + rect.width/2 - 10) + 'px';
		virtualCursor.style.top = (rect.top + rect.height/2 - 10) + 'px';
		
		// Trigger events on the actual button
		element.dispatchEvent(new MouseEvent('mouseover', { bubbles: true }));
	}

	function check_if_a_cubie_is_in_right_place(cubie1, expectedColor, cubie2, cubie3) {
	
			let f11 = cubie1[0], f12 = cubie1[1], f13 = cubie1[2], f2=cubie2[0]; f3 = cubie3[0];

	async function speakOneByOne(text) {
	  return new Promise((resolve, reject) => {
		const utterance = new SpeechSynthesisUtterance(text);
		utterance.lang = speakCurrentLang;

		// This fires when the voice finishes speaking
		utterance.onend = () => {
		  resolve();
		};

		// This fires if there is an error (e.g., voice not found)
		utterance.onerror = (event) => {
		  reject(event);
		};

		speechSynthesis.speak(utterance);
	  });
	}

	/**
	 * Highlights a specific cubie across all mirrors.
	 * @param {string} cubieKey - The key from cubiesPos (e.g., 'umr')
	 */
	function highlight(cubieKey) {
		// 1. Remove highlight from any currently highlighted cubie
		document.querySelectorAll('.highlighted-cubie').forEach(el => {
			el.classList.remove('highlighted-cubie');
		});

		// If no key provided, just clear the highlights
		if (!cubieKey) return;

		const pos = cubiesPos[cubieKey];
		if (!pos) {
			console.error("Invalid cubie key:", cubieKey);
			return;
		}

		const [hx, hy, hz] = pos;

		// 2. Apply highlight to the target cubie in all mirror registries
		registry.forEach(cube => {
			const cubie = cube.cubies.find(c => 
				parseInt(c.dataset.hx) === hx && 
				parseInt(c.dataset.hy) === hy && 
				parseInt(c.dataset.hz) === hz
			);

			if (cubie) {
				cubie.classList.add('highlighted-cubie');
			}
		});
	}

	function resetCubeColors() {
		// Define the original mapping based on your initial setup
		const originalMapping = {
			'u': colors.u, // Top
			'd': colors.d, // Bottom
			'f': colors.f, // Front
			'b': colors.b, // Back
			'l': colors.l, // Left
			'r': colors.r  // Right
		};

		// Loop through every cube instance (Main + Mirrors)
		registry.forEach(cubeInstance => {
			cubeInstance.cubies.forEach(cubie => {
				// Find each face within the cubie
				const faces = cubie.querySelectorAll('.face');
				
				faces.forEach(face => {
					// Identify which face it is by its class (u, d, f, etc.)
					const faceClass = Array.from(face.classList).find(c => originalMapping[c]);
					
					if (faceClass) {
						// Reset the background to the original color
						face.style.background = originalMapping[faceClass];
					}
				});
			});
		});

		console.log("Cube colors have been reset to original.");
		
		// Optional: Clear the Messages display
		//logMessage("Cube Reset Done!");
	}

    // THE FIX: Matrix Rotation with Integer Snapping
    function rotateMatrix(cubie, axis, angle) {
        const style = getComputedStyle(cubie);
        const matrix = new DOMMatrix(style.transform);
        const rad = (angle * Math.PI) / 180;
        const cos = Math.round(Math.cos(rad)), sin = Math.round(Math.sin(rad));

        let rot = new DOMMatrix();
        if (axis === 'y') { rot.m11=cos; rot.m13=-sin; rot.m31=sin; rot.m33=cos; }
        if (axis === 'x') { rot.m22=cos; rot.m23=sin; rot.m32=-sin; rot.m33=cos; }
        if (axis === 'z') { rot.m11=cos; rot.m12=sin; rot.m21=-sin; rot.m22=cos; }

        const res = rot.multiply(matrix);
        // Force snap to clear integers to prevent distortion
        cubie.style.transform = `matrix3d(
            ${Math.round(res.m11)}, ${Math.round(res.m12)}, ${Math.round(res.m13)}, 0,
            ${Math.round(res.m21)}, ${Math.round(res.m22)}, ${Math.round(res.m23)}, 0,
            ${Math.round(res.m31)}, ${Math.round(res.m32)}, ${Math.round(res.m33)}, 0,
            ${Math.round(res.m41)}, ${Math.round(res.m42)}, ${Math.round(res.m43)}, 1
        )`;
    }


	// A helper function that returns a Promise that resolves only when the button is clicked
	function waitForClick() {
		return new Promise((resolve) => {

			btn.style.boxShadow = "0 0 15px #ff9900";

			function handleClick() {
				btn.style.boxShadow = "none";
				// Remove the listener so it doesn't pile up
				btn.removeEventListener('click', handleClick);
				resolve(); // This "unlocks" the await in triggerMove
			}

			btn.addEventListener('click', handleClick);
		});
}


    async function triggerMove(face, direction, doNotLog = false) {
		if (isAnimating) return;
		isAnimating = true;
				
		if(	single_step_ctrl==1) {
			// Wait for the user to give the green light
			console.log(`Waiting to execute: ${face}${direction === -1 ? "'" : ""}`);
			await waitForClick();
		}
				
				
				
		if (!doNotLog) {
			n=`${face}${direction === -1 ? "'" : ""}`;
			if (moveLog.length > 0) {
				f=moveLog[moveLog.length - 1]; 
				if(f==n) {
					moveLog[moveLog.length - 1]=n+'2';
				} else {
					moveLog.push(n);
				}
			} else {
				moveLog.push(n);
			}
			updateLogUI();
		}
		
		if(face=='U') {direction = -direction;}
		if(face=='L') {direction = -direction;}
		if(face=='B') {direction = -direction;}
		if(face=='E') {direction = -direction;}
		if(face=='M') {direction = -direction;}



		const angle = direction * 90;
		const speed = 1050 - document.getElementById('speed-range').value;


		registry.forEach(reg => {
			const layer = reg.cubies.filter(c => {
				const m = new DOMMatrix(getComputedStyle(c).transform);
				const cx = Math.round(m.m41 / 52), cy = Math.round(m.m42 / 52), cz = Math.round(m.m43 / 52);
				
				// Standard Faces
				if (face === 'U') return cy === -1; if (face === 'D') return cy === 1;
				if (face === 'L') return cx === -1; if (face === 'R') return cx === 1;
				if (face === 'F') return cz === 1;  if (face === 'B') return cz === -1;
				
				// Middle/Slice Layers
				if (face === 'M') return cx === 0;  // Vertical middle (between L and R)
				if (face === 'E') return cy === 0;  // Horizontal middle (between U and D)
				if (face === 'S') return cz === 0;  // Standing slice (between F and B)
				return false;
			});

			const pivot = document.createElement('div');
			pivot.className = 'pivot';
			reg.el.appendChild(pivot);
			layer.forEach(c => pivot.appendChild(c));

			// Determine Rotation Axis
			const axis = (face === 'U' || face === 'D' || face === 'E') ? 'Y' : 
						 (face === 'L' || face === 'R' || face === 'M') ? 'X' : 'Z';
			
			pivot.style.transition = `transform ${speed}ms cubic-bezier(0.4, 0, 0.2, 1)`;
			pivot.getBoundingClientRect(); // trigger reflow
			pivot.style.transform = `rotate${axis}(${angle}deg)`;

			setTimeout(() => {
				layer.forEach(c => {
					rotateMatrix(c, axis.toLowerCase(), angle);
					reg.el.appendChild(c);
				});
				pivot.remove();
			}, speed);
		});

		await new Promise(r => setTimeout(r, parseInt(speed) + 10));
		isAnimating = false;
		
		totalSteps++;
		// Add this line to update the display
		updateSteps(stage);
	}

	async function processCmds(c) {
		c=c.trim();
		cmds=c.split(' ');
		
		//console.log("cmds: ", cmds);	
		
		
		switch (cmds[0]) {
			case 'reset':
				resetCube();
				break;
			case 'restart':
				restartCubeOps();
				break;
			case 'scramble':
				scramble();  // will scramble, not log it.
				break;
			case 'solve':
				if(cmds.length>1){stage = cmds[1]; }
				await solve();
				break;
			case 'pauseCtrl':
				pause_cntrl =cmds[1];
				const radio = document.getElementById('pause-toggle');
				if(cmds[1]=='1') {
					radio.checked = true;
					radio.dataset.checked = "true";
				} else {				
					radio.checked = false;
					radio.dataset.checked = "false";	
				}				
				break;
			case 'pause':
				pauseFlag=1;
				break;
			case 'loadSt':
				loadTestStates(cmds[1]);
				break;
			case 'loadSq':
				loadTestSeqs(cmds[1]);
				break;
			case 'play':
				if(cmds.length>1){currentPointer = cmds[1]; }
				await handlePlayControl();
				break;	
			case 'singleStep':
				await stepMove();
				break;	
			case 'speed':
				if(cmds[1] <50) cmds[1] =50;
				if(cmds[1] >1000) cmds[1] =1000;
				setSpeed(cmds[1]);
				break;	
			case 'size':
				if(cmds[1] <0.5) cmds[1] =0.5;
				if(cmds[1] >2.0) cmds[1] =2.0;
				setSize(cmds[1]);
				break;	
			case 'clearMsg':
				clearMsg();
				break;	
			case 'stateSaveCtrl':
				hideShowElement(cmds[1] , "sl_state");
				break;	
			case 'seqSaveCtrl':
				hideShowElement(cmds[1] , "sl_seq");
				break;		
				
			case 'flash':
				highlight(cmds[1]);		
				setTimeout(() => {
					highlight();
				}, cmds[2]);		
				break;	
				
			case 'timeOut':
				setTimeout(() => {
				}, cmds[1]);		
				break;		
				
			case 'paint':
				change_cubie_face_color(cmds[1],cmds[2],cmds[3]);   // ('fuc', 'f', 'grey');
				break;				
		}
	}
	
	
	async function handlePlayControl() { 
		playing=1;
		while(currentPointer < moveLog.length) { 
			await stepMove();
			if(pauseFlag==1) { pauseFlag=0; break;}
			if(resetFlag==1) { resetCubeOps(); break;}
			if(restartFlag==1) { restartCubeOps() ; break;}			
		}
		playing=0;
	}
	
	
	
    async function stepMove() {
        if (currentPointer >= moveLog.length) return;
        		
		let m = moveLog[currentPointer];
		
		m=m.trim();
		
		if(m.substring(0,2) == "mk") { 
			let n=m.substring(3);
			if(n==99) {
				pauseFlag = 1;
			}else {
				stage =n;
				if((stage=='1')||(stage=='1.1')) { totalSteps=0; stage='1';} ;
				updateSteps(stage);
				logMessage(translations[currentLang][stage]);

				if(pause_cntrl == 1){pauseFlag = 1; } 
				if(stage == 100) 	{pauseFlag = 1; }   // pause when it is done even through there more items
			}
		} else if(m.substring(0,2) == "ms"){
			let msg=m.substring(3);
			msg=msg.trim();
			if(msg.substring(0,2) != "//"){
				logMessage(msg);		
				await speakOneByOne(msg);			
			}
		} else if (m.substring(0,2) == "sp") {
			speak(m.substring(3));
		} else if(m.substring(0,2) == "mt"){
			let msg=m.substring(3);
			msg=msg.trim();
			if(msg.substring(0,2) != "//"){
				await processCmds(msg);
			}
		}
		else {
			cmds=m.split(":");
			if( cmds.length > 1) {	
				m=cmds[0];
				logMessage(cmds[1]);
				await speakOneByOne(cmds[1]); 
			} 
			
			if( m[0] === m[0].toUpperCase() ) {
				let dir = m.includes("'") ? -1 : 1;
				await triggerMove(m[0], dir, true);					
				if(m.includes("2")) await triggerMove(m[0], dir, true);
			} else { 
				let dir = m.includes("'") ? -1 : 1;
				await handleSpecialMove(m[0], dir, true);					
				if(m.includes("2")) await handleSpecialMove(m[0], dir, true);	
			}			
        }
		currentPointer++; 
		updateLogUI(0);
    }

	// Function to Paste Log from Clipboard
	async function pasteLogFromClipboard() {
		try {
			const text = await navigator.clipboard.readText();
			if (!text) return;

			// Split by space or comma and filter out empty strings
			const newMoves = text.trim().split(/[\s,]+/).filter(m => m.length > 0);
			
			if (newMoves.length > 0) {
				// Update the moveLog and reset pointer
				moveLog = newMoves;
				currentPointer = 0;
				updateLogUI(0);
				logMessage(`Pasted ${newMoves.length} moves from clipboard.`);
			}
		} catch (err) {
			console.error('Failed to read clipboard: ', err);
			logMessage("Error: Clipboard access denied.");
		}
	}

    async function loadTestSeqs(seqName) {
	
		seqs={
			'intr':{
				"moveLog": [
				 "ms: 魔方简介:",
				 "ms:  魔方为 3×3×3 的立方体, 由6个中心块, 12个棱块, 8个角块组成, 共26个小方块。",
				 "ms:  魔方共有6个面，每个面颜色不同,通常为白、黄、红、橙、蓝、绿。",
				 "sp:  中心块只有一面可见，固定不动，决定每个面的颜色, 棱块有两面可见，角块有三面可见。",
				 "ms:  魔方 白色面对黄色面， 红色面对橙色面，绿色面对蓝色面。",
				 "ms:  魔方的面是： 前面F，背面B，左面L， 右面R， 顶层U， 底层D 。",
				 "ms:  中间层是：   M层：左右面之间;  E层： 顶底层之间; S层： 前后面之间。",
				 "ms: 转动格式：",
				 "ms:  大写字母(F，B, L，R，U，D)代表90度顺时针转动。 比如，面对着右面，R就是转动右面顺时针90度。", 
				 "ms:  用\‘表示逆时针转动90度， 比如  F\' 表示前面逆时针转动90度。",
				 "ms:  M：转动方向与 L 相同（从左边看的顺时针）。",
				 "ms:  E：转动方向与 D 相同（从下面看的顺时针）。",
				 "ms:  S：转动方向与 F 相同（从前面看的顺时针）。",
				 "ms:  小写字母（r, l, u, d, f, b）表示相邻两面一起转： 比如 r 表示右边两面一起顺时针转90度。",
				 "ms:  (x,y,z) 表示整个魔方转动: x方向跟R一样, y方向跟U一样，z方向跟F一样。",
				 "ms:  数字2表示转动180度：  比如 R2 表示右面转动180度。",
				 "mk 99"
			  ],
			  "currentPointer": 0
			},	
			
			'schemeBrief':{
				"moveLog": [
				"ms: 魔方恢复方法:  这里主要介绍的魔方恢复方法是一种初级方法，属于分层恢复法，简单易学，不是速拧法。",
				"ms: 本魔方恢复法分5步：", 
				"ms:    1. 拼白色十字",
				"ms:    2. 恢复中间层",
				"ms:    3. 恢复白色层",
				"ms:    4. 拼黄色十字和把黄色角块归位",
				"ms:    5. 把黄色角块摆正",
				"mk 99"
			  ],
			  "currentPointer": 0
			}
		}
		
		loadSequence(seqs[seqName]);
		await handlePlayControl();
	 
	}	

	function playSeq(seqName) {
		loadTestSeqs(seqName);
	}




    document.getElementById('speed-range').oninput = (e) => animSpeed = 1050 - e.target.value;
    document.getElementById('size-range').oninput = (e) => { 
		currentScale = e.target.value; 
		
		// Update the main cube
		mainCubeEl.style.transform = `scale(${currentScale}) rotateX(${rx}deg) rotateY(${ry}deg)`; 
		
		// Update the mirror images
		// We scale the mirrors by a factor of the currentScale (originally 0.45)
		const mirrorScale = currentScale * 0.45;
		
		document.getElementById('cube-back').style.transform = `scale(${mirrorScale}) rotateY(180deg)`;
		document.getElementById('cube-left').style.transform = `scale(${mirrorScale}) rotateY(90deg)`;
		document.getElementById('cube-bottom').style.transform = `scale(${mirrorScale}) rotateX(90deg)`;
	};

	document.getElementById('lang-select').value = defaultLang;
	changeLanguage(defaultLang);


    registry.forEach(c => createCubies(c.el, c.cubies));
    mainCubeEl.style.transform = `scale(0.7) rotateX(${rx}deg) rotateY(${ry}deg)`;
	
	//hideShowElement(0, "test1");
	//hideShowElement(0, "test2");
	//hideShowElement(0, "sl_state");
	//hideShowElement(0, "sl_seq");
	
	toggleVisibility("sl_state", 1);
	toggleVisibility("sl_seq", 1);
	
	
</script>
